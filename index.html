<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="assets/favicon.png" type="image/png">
  <link rel="stylesheet" href="styles/reset.css">
  <link rel="stylesheet" href="styles/styles.css">
  <title>Admin Dashboard</title>
</head>

<body>

  <main>

    <!-- Sidebar -->
    <!-- Sidebar title -->
    <aside class="sidebar">
      <article class="aside-title">
        <img id="dashboard-logo" src="assets/dashboard.png" alt="Dashboard">
        <h2 id="dashboard">Dashboard</h2>
      </article>

      <!-- Top links -->
      <article class="info-top">
        <section class="link-top home">
          <img class="icon" src="assets/home.png" alt="Home">
          <p class="link">Home</p>
        </section>
        <section class="link-top">
          <img class="icon" src="assets/profile.png" alt="Profile">
          <p class="link">Profile</p>
        </section>
        <section class="link-top">
          <img class="icon" src="assets/message.png" alt="Messages">
          <p class="link">Messages</p>
        </section>
        <section class="link-top">
          <img class="icon" src="assets/history.png" alt="History">
          <p class="link">History</p>
        </section>
        <section class="link-top">
          <img class="icon" src="assets/tasks.png" alt="Tasks">
          <p class="link">Tasks</p>
        </section>
        <section class="link-top">
          <img class="icon" src="assets/communities.png" alt="Communities">
          <p class="link">Communities</p>
        </section>
      </article>

      <!-- Bottom links -->
      <article class="info-bottom">
        <section class="link-bottom">
          <img class="icon" src="assets/settings.png" alt="Settings">
          <p class="link">Settings</p>
        </section>
        <section class="link-bottom">
          <img class="icon" src="assets/support.png" alt="Support">
          <p class="link">Support</p>
        </section>
        <section class="link-bottom">
          <img class="icon" src="assets/privacy.png" alt="Privacy">
          <p class="link">Privacy</p>
        </section>
      </article>
    </aside>

        <!-- Header -->
        <header class="header">

          <!-- Search Area -->
          <article class="search-area">
            <img id="search" src="assets/search.png" alt="Search">
            <input class="search-bar" type="text">
            <img id="notifications" src="assets/notifications.png" alt="Notifications">
            <img id="avatar-mini" src="assets/profile-mini.gif" alt="Avatar">
            <p class="name">Erasmo J. Rojas G.</p>
          </article>
    
          <!-- User information -->
          <article class="user-info">
            <img id="avatar" src="assets/profile.gif" alt="Avatar">
            <div class="user">
              <p class="greetings">Hi there,</p>
              <p class="username">Erasmo J. Rojas G. (@erasmorojastech)</p>
            </div>
            <button id="new" type="submit">New</button>
            <button id="upload" type="submit">Upload</button>
            <button id="share" type="submit">Share</button>
          </article>
    
        </header>

    <article class="content"></article>
  </main>
</body>

</html>
